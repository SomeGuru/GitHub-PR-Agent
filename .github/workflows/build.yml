name: Build Project

# Generated by GitHub PR Agent. Build profile is selected by the user.
# Build type: Python
# Output mode: Release on tags

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Python (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }
      - name: Build
        run: pyinstaller --noconfirm --windowed --name app --distpath dist "GitHub_PR_Agent.py"
      - name: Package
        run: Compress-Archive -Path dist/* -DestinationPath app-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: app-windows.zip

  build-fedora:
    name: Build Python (fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf -y install python3 python3-pip python3-tkinter binutils && pip3 install --upgrade pyinstaller
      - name: Install project dependencies
        run: if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
      - name: Build
        run: pyinstaller --noconfirm --onefile --name app-fedora --distpath dist "GitHub_PR_Agent.py"
      - name: Package
        run: tar -czf app-fedora.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: app-fedora
          path: app-fedora.tar.gz

  build-debian:
    name: Build Python (debian)
    runs-on: ubuntu-latest
    container: debian:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apt-get update && apt-get -y install python3 python3-pip python3-tk binutils && pip3 install --break-system-packages --upgrade pyinstaller
      - name: Install project dependencies
        run: if [ -f requirements.txt ]; then pip3 install --break-system-packages -r requirements.txt; fi
      - name: Build
        run: pyinstaller --noconfirm --onefile --name app-debian --distpath dist "GitHub_PR_Agent.py"
      - name: Package
        run: tar -czf app-debian.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: app-debian
          path: app-debian.tar.gz

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-fedora
      - build-debian
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

