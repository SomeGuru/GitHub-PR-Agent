name: Build Project

# Generated by GitHub PR Agent. Build profile is selected by the user.
# Build type: Python
# Output mode: Release on tags

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build GitHub-PR-Agent (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }
      - name: Build single-file executable
        run: pyinstaller --noconfirm --onefile --windowed --name "GitHub-PR-Agent" --distpath dist "GitHub_PR_Agent.py"
      - uses: actions/upload-artifact@v4
        with:
          name: GitHub-PR-Agent-windows
          path: dist/GitHub-PR-Agent.exe

  build-fedora:
    name: Build GitHub-PR-Agent (fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf -y install python3 python3-pip python3-tkinter binutils && pip3 install --upgrade pyinstaller
      - name: Install project dependencies
        run: if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
      - name: Build single-file executable
        run: pyinstaller --noconfirm --onefile --name "GitHub-PR-Agent-fedora" --distpath dist "GitHub_PR_Agent.py"
      - uses: actions/upload-artifact@v4
        with:
          name: GitHub-PR-Agent-fedora
          path: dist/GitHub-PR-Agent-fedora

  build-debian:
    name: Build GitHub-PR-Agent (debian)
    runs-on: ubuntu-latest
    container: debian:latest
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apt-get update && apt-get -y install python3 python3-pip python3-tk binutils && pip3 install --break-system-packages --upgrade pyinstaller
      - name: Install project dependencies
        run: if [ -f requirements.txt ]; then pip3 install --break-system-packages -r requirements.txt; fi
      - name: Build single-file executable
        run: pyinstaller --noconfirm --onefile --name "GitHub-PR-Agent-debian" --distpath dist "GitHub_PR_Agent.py"
      - uses: actions/upload-artifact@v4
        with:
          name: GitHub-PR-Agent-debian
          path: dist/GitHub-PR-Agent-debian

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-fedora
      - build-debian
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

